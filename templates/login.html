{% extends 'base.html' %}
{% block title %}Вход – График{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="card shadow-sm border-0">
      <div class="card-header bg-primary text-white text-center py-3">
        <h4 class="mb-0"><i class="bi bi-calendar3-week"></i> График – Автоматизация</h4>
        <small class="opacity-75">у-к Автоматизация</small>
      </div>
      <div class="card-body p-4">
        <form method="POST" autocomplete="on">
          <div class="mb-3">
            <label class="form-label fw-semibold">Потребителско Име</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" name="username" class="form-control" required autofocus
                     placeholder="Потребителско / работен №">
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Парола</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" class="form-control" required
                     placeholder="Парола">
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
            <i class="bi bi-box-arrow-in-right"></i> Вход
          </button>
        </form>
      </div>
      <div class="card-footer text-center text-muted small py-2">
        Служителите влизат с работния си номер
      </div>
    </div>
  </div>
</div>
{% endblock %}
