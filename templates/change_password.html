{% extends 'base.html' %}
{% block title %}Смяна на Парола{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm border-0">
      <div class="card-header bg-secondary text-white">
        <i class="bi bi-key"></i> Смяна на Парола
      </div>
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Текуща парола</label>
            <input type="password" name="current_password" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Нова парола</label>
            <input type="password" name="new_password" class="form-control" required minlength="4">
          </div>
          <div class="mb-4">
            <label class="form-label">Потвърди нова парола</label>
            <input type="password" name="confirm_password" class="form-control" required>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg"></i> Запази
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
